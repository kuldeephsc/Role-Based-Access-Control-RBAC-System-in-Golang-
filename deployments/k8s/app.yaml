apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-api
  namespace: rbac-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rbac-api
  template:
    metadata:
      labels:
        app: rbac-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rbac-api
          image: rbac-platform:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rbac-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rbac-secrets
                  key: JWT_SECRET
            - name: REDIS_ADDR
              value: redis:6379
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
            - name: JAEGER_ENDPOINT
              value: jaeger:4318
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rbac-api
  namespace: rbac-platform
spec:
  selector:
    app: rbac-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rbac-api
  namespace: rbac-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: rbac.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rbac-api
                port:
                  number: 80
