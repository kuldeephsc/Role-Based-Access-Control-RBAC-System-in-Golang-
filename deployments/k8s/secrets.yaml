# Apply with: kubectl apply -f secrets.yaml
# In production, use a secrets manager or sealed-secrets, never commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: rbac-secrets
  namespace: rbac-platform
type: Opaque
stringData:
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/rbac_platform?sslmode=disable
  POSTGRES_PASSWORD: postgres
  JWT_SECRET: change-me-in-production
