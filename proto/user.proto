syntax = "proto3";
package user;
option go_package = "rbac-platform/proto/userpb";

service UserService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (User);
}

message GetUserRequest {
  string user_id = 1;
}

message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
  bool is_active = 4;
  string created_at = 5;
}

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
}

message UpdateUserRequest {
  string user_id = 1;
  string full_name = 2;
}
